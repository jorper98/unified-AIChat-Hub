services:
  # 1. Next.js Web App (Pre-built Docker Image)
  web-app:
    image: ghcr.io/jorper98/unified-aichat-hub:v0.4.5
    container_name: unified_chat_web
    ports:
      - "3031:3000"
    env_file:
      - .env
    volumes:
      - ./chat_images:/app/public/images
    depends_on:
      - mongo_db
    restart: unless-stopped

  # 2. MongoDB Database Container
  mongo_db:
    image: mongo:6.0
    container_name: unified_chat_mongo
    ports:
      - "27017:27017"
    volumes:
      - ./data:/data/db
      - ./backups:/backups
    restart: unless-stopped